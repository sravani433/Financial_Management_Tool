<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Financial Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

  <!-- KPI GRID -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">

    <!-- Income -->
    <div class="bg-gray-800 rounded-xl p-5">
      <p class="text-sm text-gray-400">Total Income</p>
      <h2 class="text-2xl font-semibold mt-2">₹46.15L</h2>
      <p class="text-xs text-green-400 mt-1">2 Income Streams</p>
    </div>

    <!-- Investment -->
    <div class="bg-gray-800 rounded-xl p-5">
      <p class="text-sm text-gray-400">Investments</p>
      <h2 class="text-2xl font-semibold mt-2">₹10.06L</h2>
      <p class="text-xs text-blue-400 mt-1">3 Asset Classes</p>
    </div>

    <!-- Expenditure -->
    <div class="bg-gray-800 rounded-xl p-5">
      <p class="text-sm text-gray-400">Expenditure</p>
      <h2 class="text-2xl font-semibold mt-2">₹13.09L</h2>
      <p class="text-xs text-yellow-400 mt-1">8 Categories</p>
    </div>

    <!-- Financial Obligations -->
    <div class="bg-gray-800 rounded-xl p-5 border border-red-500">
      <p class="text-sm text-gray-400">Outstanding Obligations</p>
      <h2 class="text-2xl font-semibold mt-2 text-red-400">₹18.83L</h2>
      <p class="text-xs text-red-500 mt-1">High Risk Exposure</p>
    </div>
  </div>

  <!-- DISTRIBUTION -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">

    <!-- Expenditure Distribution -->
    <div class="bg-gray-800 rounded-xl p-5">
      <p class="text-sm text-gray-400 mb-3">Expenditure Breakdown</p>
      <div class="space-y-2">
        <div class="flex justify-between text-sm">
          <span>Lifestyle</span><span>₹5.2L</span>
        </div>
        <div class="flex justify-between text-sm">
          <span>Utilities</span><span>₹2.4L</span>
        </div>
        <div class="flex justify-between text-sm">
          <span>Travel</span><span>₹1.8L</span>
        </div>
      </div>
    </div>

    <!-- Net Impact -->
    <div class="bg-gray-800 rounded-xl p-5">
      <p class="text-sm text-gray-400">Net Financial Impact</p>
      <h2 class="text-3xl font-semibold mt-3 text-green-400">₹14.28L</h2>
      <p class="text-xs text-gray-400 mt-1">Income – Expenses – Obligations</p>
    </div>
  </div>

</body>
</html>
