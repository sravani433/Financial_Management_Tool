<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Income Analysis – Actual vs Projected</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: Inter, sans-serif;
      padding: 24px;
    }

    h2 {
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      cursor: pointer;
    }

    .btn.active {
      background: #22c55e;
      color: #020617;
      font-weight: 600;
    }

    select {
      padding: 8px 12px;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 6px;
    }

    .chart-card {
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      max-width: 900px;
    }
  </style>
</head>
<body>

<h2>Income (Actual v/s Projected)</h2>

<div class="toolbar">
  <!-- Classification Buttons -->
  <button class="btn active" onclick="selectClassification('primary')">
    Primary Income
  </button>
  <button class="btn" onclick="selectClassification('secondary')">
    Secondary Income
  </button>

  <!-- Subclassification Dropdown -->
  <label>
    Sub-classification:
    <select id="subSelect" onchange="updateChart()"></select>
  </label>
</div>

<div class="chart-card">
  <canvas id="incomeChart" height="140"></canvas>
</div>

<script>
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const dataMap = {
    primary: {
      Salary: {
        actual:    [18000,18000,45000,18000,18000,18000,18000,18000,18000,18000,18000,18000],
        projected: [18000,18000,20000,18000,18000,18000,18000,18000,18000,18000,18000,18000]
      },
      Bonus: {
        actual:    [0,0,20000,0,0,0,0,0,0,0,0,0],
        projected: [0,0,15000,0,0,0,0,0,0,0,0,0]
      }
    },
    secondary: {
      Freelance: {
        actual:    [4000,4500,5000,4800,5200,5500,6000,5800,6100,6200,6500,7000],
        projected: [4500,4800,5200,5000,5500,5800,6200,6000,6300,6500,6800,7200]
      },
      Rental: {
        actual:    Array(12).fill(8000),
        projected: Array(12).fill(8000)
      }
    }
  };

  let currentType = "primary";
  let chart;

  function populateDropdown() {
    const select = document.getElementById("subSelect");
    select.innerHTML = "";

    Object.keys(dataMap[currentType]).forEach(key => {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = key;
      select.appendChild(opt);
    });
  }

  function updateChart() {
    const sub = document.getElementById("subSelect").value;
    const dataset = dataMap[currentType][sub];

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("incomeChart"), {
      type: "bar",
      data: {
        labels: months,
        datasets: [
          {
            label: "Actual",
            data: dataset.actual,
            backgroundColor: "#60a5fa"
          },
          {
            label: "Projected",
            data: dataset.projected,
            backgroundColor: "#fbbf24"
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: "top" }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  function selectClassification(type) {
    currentType = type;
    document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    populateDropdown();
    updateChart();
  }

  // Initial load
  populateDropdown();
  updateChart();
</script>

</body>
</html>
