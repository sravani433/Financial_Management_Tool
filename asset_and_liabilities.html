<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quarterly Asset & Liability Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Inter, system-ui, sans-serif;
      color: #e5e7eb;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
    }

    h2 {
      margin-bottom: 16px;
      font-weight: 600;
    }

    .card {
      background: #020617;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    canvas {
      max-height: 420px;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Quarterly Assets vs Liabilities</h2>

    <div class="card">
      <canvas id="quarterlyChart"></canvas>
    </div>

    <div class="note">
      Y-axis represents count only. Hover on each line for amount and category details.
    </div>
  </div>

  <script>
    /**
     * Backend-ready structure
     */
    const quarterlyData = {
      Q1: {
        assets: {
          count: 12,
          total: 3200000,
          breakdown: {
            Equity: 1400000,
            "Mutual Funds": 900000,
            FD: 500000,
            Gold: 400000
          }
        },
        liabilities: {
          count: 4,
          total: 1250000,
          breakdown: {
            "Home Loan": 900000,
            "Car Loan": 250000,
            "Credit Card": 100000
          }
        }
      },
      Q2: {
        assets: {
          count: 14,
          total: 3650000,
          breakdown: {
            Equity: 1600000,
            "Mutual Funds": 1100000,
            FD: 550000,
            Gold: 400000
          }
        },
        liabilities: {
          count: 3,
          total: 980000,
          breakdown: {
            "Home Loan": 780000,
            "Car Loan": 200000
          }
        }
      },
      Q3: {
        assets: {
          count: 16,
          total: 4100000,
          breakdown: {
            Equity: 1900000,
            "Mutual Funds": 1300000,
            FD: 500000,
            Gold: 400000
          }
        },
        liabilities: {
          count: 3,
          total: 820000,
          breakdown: {
            "Home Loan": 650000,
            "Car Loan": 170000
          }
        }
      },
      Q4: {
        assets: {
          count: 18,
          total: 4550000,
          breakdown: {
            Equity: 2200000,
            "Mutual Funds": 1500000,
            FD: 450000,
            Gold: 400000
          }
        },
        liabilities: {
          count: 2,
          total: 600000,
          breakdown: {
            "Home Loan": 600000
          }
        }
      }
    };

    const labels = Object.keys(quarterlyData);

    const assetCounts = labels.map(q => quarterlyData[q].assets.count);
    const liabilityCounts = labels.map(q => quarterlyData[q].liabilities.count);

    new Chart(document.getElementById("quarterlyChart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Assets",
            data: assetCounts,
            borderColor: "#22c55e",
            backgroundColor: "rgba(34,197,94,0.15)",
            tension: 0.35,
            pointRadius: 5,
            pointHoverRadius: 7
          },
          {
            label: "Liabilities",
            data: liabilityCounts,
            borderColor: "#ef4444",
            backgroundColor: "rgba(239,68,68,0.15)",
            tension: 0.35,
            pointRadius: 5,
            pointHoverRadius: 7
          }
        ]
      },
      options: {
        responsive: true,
        interaction: {
          mode: "nearest",
          intersect: true
        },
        plugins: {
          tooltip: {
            backgroundColor: "#020617",
            borderColor: "rgba(255,255,255,0.12)",
            borderWidth: 1,
            padding: 12,
            callbacks: {
              title(context) {
                return context[0].label;
              },
              label(context) {
                const type = context.dataset.label.toLowerCase();
                const quarter = context.label;
                const info = quarterlyData[quarter][type];

                return [
                  `${context.dataset.label}`,
                  `Count: ${info.count}`,
                  `Total Amount: ₹${info.total.toLocaleString("en-IN")}`
                ];
              },
              afterLabel(context) {
                const type = context.dataset.label.toLowerCase();
                const quarter = context.label;
                const breakdown = quarterlyData[quarter][type].breakdown;

                return Object.entries(breakdown).map(
                  ([k, v]) => `• ${k}: ₹${v.toLocaleString("en-IN")}`
                );
              }
            }
          },
          legend: {
            labels: { color: "#e5e7eb" }
          }
        },
        scales: {
          x: {
            ticks: { color: "#94a3b8" },
            grid: { color: "rgba(255,255,255,0.05)" }
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: "#94a3b8",
              precision: 0
            },
            title: {
              display: true,
              text: "Count",
              color: "#94a3b8"
            },
            grid: { color: "rgba(255,255,255,0.05)" }
          }
        }
      }
    });
  </script>
</body>
</html>
